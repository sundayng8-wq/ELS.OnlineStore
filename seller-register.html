<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Seller Registration - ELS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-50">
  <div class="w-full max-w-xl p-8 bg-white rounded-2xl shadow">
    <h1 class="text-2xl font-bold mb-4">Register as a Seller</h1>
    <form id="seller-register-form">
      <div class="mb-3">
        <label class="block text-sm mb-1">Full name</label>
        <input id="name" class="w-full px-3 py-2 rounded border" required />
      </div>
      <div class="mb-3">
        <label class="block text-sm mb-1">Email</label>
        <input id="email" type="email" class="w-full px-3 py-2 rounded border" required />
      </div>
      <div class="mb-3">
        <label class="block text-sm mb-1">Password</label>
        <input id="password" type="password" class="w-full px-3 py-2 rounded border" required />
      </div>
      <div class="mb-4">
        <button type="submit" class="px-4 py-2 rounded bg-indigo-600 text-white">Create Seller Account</button>
        <a href="index.html" class="ml-3 text-sm text-gray-600">Back</a>
      </div>
      <div id="result" class="text-sm text-red-600"></div>
    </form>
  </div>
  <script src="js/seller-register.js"></script>
</body>
</html>
