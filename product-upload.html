<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Upload Product - ELS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-slate-50">
  <div class="max-w-3xl mx-auto p-8">
    <h1 class="text-2xl font-bold mb-4">Create or Edit Product</h1>
    <p class="text-sm text-slate-600 mb-4">Upload a new product, or edit one by opening this page with <code>?product_id=PRODUCT_ID</code>.</p>
    <form id="product-form" class="bg-white p-6 rounded-2xl shadow">
      <div class="mb-3">
        <label class="block text-sm mb-1">Product name</label>
        <input id="product-name" class="w-full px-3 py-2 rounded border" required />
      </div>
      <div class="mb-3">
        <label class="block text-sm mb-1">Price</label>
        <input id="product-price" type="number" class="w-full px-3 py-2 rounded border" required />
      </div>
      <div class="mb-3">
        <label class="block text-sm mb-1">Category</label>
        <input id="product-category" class="w-full px-3 py-2 rounded border" />
      </div>
      <div class="mb-3">
        <label class="block text-sm mb-1">Description</label>
        <textarea id="product-desc" class="w-full px-3 py-2 rounded border" rows="4"></textarea>
      </div>
      <div class="mb-5">
        <label class="block text-sm mb-1">Images</label>
        <div id="image-upload-area" class="border border-dashed border-slate-300 rounded-lg p-4 cursor-pointer text-center text-slate-500 hover:border-slate-400 transition">
          Click or drop images here to upload
          <input id="prod-image" type="file" accept="image/*" multiple class="hidden" />
        </div>
        <div id="image-preview-section" class="mt-4 hidden">
          <div id="image-gallery" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        </div>
        <div id="upload-status" class="text-sm mt-2"></div>
      </div>
      <div class="flex flex-wrap gap-3">
        <button id="create-product" class="px-4 py-2 rounded bg-emerald-600 text-white">Create Product</button>
        <a href="payment-details.html" class="px-4 py-2 rounded bg-gray-200">Back to Payment Details</a>
        <a href="index.html" class="px-4 py-2 rounded bg-gray-200">Home</a>
      </div>
      <div id="result" class="mt-3 text-sm"></div>
    </form>
  </div>

  <script src="js/cloudupload.js"></script>
  <script src="js/product-upload.js"></script>
</body>
</html>
