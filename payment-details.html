<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Seller Payment Details - ELS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-50">
  <div class="w-full max-w-2xl p-8 bg-white rounded-2xl shadow">
    <h1 class="text-2xl font-bold mb-4">Seller Payment Details</h1>
    <p class="text-sm text-slate-600 mb-6">Complete your payment setup so you can upload products and receive payouts.</p>
    <div id="already-store" class="mb-4 text-sm text-emerald-700"></div>
    <form id="payment-details-form" class="space-y-4">
      <div>
        <label class="block text-sm mb-1">Store Name</label>
        <input id="store-name" class="w-full px-3 py-2 rounded border" required />
      </div>
      <div>
        <label class="block text-sm mb-1">Store Description</label>
        <textarea id="store-description" rows="3" class="w-full px-3 py-2 rounded border"></textarea>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm mb-1">Bank Account Name</label>
          <input id="bank-account-name" class="w-full px-3 py-2 rounded border" required />
        </div>
        <div>
          <label class="block text-sm mb-1">Bank Account Number</label>
          <input id="bank-account-number" class="w-full px-3 py-2 rounded border" required />
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm mb-1">Bank Name</label>
          <input id="bank-name" class="w-full px-3 py-2 rounded border" required />
        </div>
        <div>
          <label class="block text-sm mb-1">Preferred Payment Method</label>
          <select id="payment-method" class="w-full px-3 py-2 rounded border">
            <option value="bank_transfer">Bank Transfer</option>
            <option value="cash_on_delivery">Pay on Delivery</option>
            <option value="google_pay">Google Pay / Mobile Wallet</option>
            <option value="international_card">International Credit Card</option>
          </select>
        </div>
      </div>
      <div class="flex flex-wrap gap-3 items-center">
        <button type="submit" class="px-5 py-3 rounded bg-indigo-600 text-white">Save and Upload Product</button>
        <a href="seller-register.html" class="text-sm text-gray-600 hover:text-gray-900">Back to Seller Signup</a>
        <a href="index.html" class="text-sm text-gray-600 hover:text-gray-900">Home</a>
      </div>
      <div id="payment-result" class="text-sm text-red-600"></div>
    </form>
  </div>
  <script src="js/payment-details.js"></script>
</body>
</html>
